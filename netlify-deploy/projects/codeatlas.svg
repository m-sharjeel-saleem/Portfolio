<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#07070b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientTransform="translate(220 120) scale(520)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(1050 90) scale(460)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>

  <!-- Logo + wordmark -->
  <g transform="translate(96 96)">
    <rect width="64" height="64" rx="16" fill="url(#accent)"/>
    <path d="M32 16 L46 24 L46 40 L32 48 L18 40 L18 24 Z" stroke="#0a0a12" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
    <text x="84" y="30" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff">CodeAtlas</text>
    <text x="84" y="54" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#8a8aa0">Agentic Codebase Intelligence</text>
  </g>

  <!-- Headline -->
  <text x="96" y="300" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" fill="url(#title)">Understand any codebase</text>
  <text x="96" y="372" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" fill="#e7e7ee">in minutes, not hours.</text>
  <text x="98" y="420" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#9a9ab0">Multi-agent review · RAG · verified findings · full observability</text>

  <!-- Agent pipeline motif -->
  <g transform="translate(96 486)" font-family="Inter, system-ui, sans-serif">
    <!-- connectors -->
    <line x1="150" y1="44" x2="1104" y2="44" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <g font-size="14" font-weight="600">
      <!-- node template -->
      <g transform="translate(0 0)"><rect width="150" height="88" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#7c5cff" stroke-opacity="0.5"/><circle cx="26" cy="30" r="12" fill="#7c5cff" fill-opacity="0.25"/><text x="48" y="35" fill="#e7e7ee">Router</text><text x="20" y="64" font-size="12" font-weight="400" fill="#7a7a92">intent</text></g>
      <g transform="translate(191 0)"><rect width="150" height="88" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#7c5cff" stroke-opacity="0.5"/><circle cx="26" cy="30" r="12" fill="#7c5cff" fill-opacity="0.25"/><text x="48" y="35" fill="#e7e7ee">Retriever</text><text x="20" y="64" font-size="12" font-weight="400" fill="#7a7a92">hybrid RAG</text></g>
      <g transform="translate(382 0)"><rect width="150" height="88" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#22d3ee" stroke-opacity="0.45"/><circle cx="26" cy="30" r="12" fill="#22d3ee" fill-opacity="0.22"/><text x="48" y="35" fill="#e7e7ee">Security</text><text x="20" y="64" font-size="12" font-weight="400" fill="#7a7a92">OWASP</text></g>
      <g transform="translate(573 0)"><rect width="150" height="88" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#22d3ee" stroke-opacity="0.45"/><circle cx="26" cy="30" r="12" fill="#22d3ee" fill-opacity="0.22"/><text x="44" y="35" fill="#e7e7ee">Perf</text><text x="20" y="64" font-size="12" font-weight="400" fill="#7a7a92">hot paths</text></g>
      <g transform="translate(764 0)"><rect width="150" height="88" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#22d3ee" stroke-opacity="0.45"/><circle cx="26" cy="30" r="12" fill="#22d3ee" fill-opacity="0.22"/><text x="48" y="35" fill="#e7e7ee">Logic</text><text x="20" y="64" font-size="12" font-weight="400" fill="#7a7a92">edge cases</text></g>
      <g transform="translate(955 0)"><rect width="150" height="88" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#34d399" stroke-opacity="0.55"/><circle cx="26" cy="30" r="12" fill="#34d399" fill-opacity="0.25"/><text x="48" y="35" fill="#e7e7ee">Critic</text><text x="20" y="64" font-size="12" font-weight="400" fill="#7a7a92">verifies</text></g>
    </g>
  </g>

  <!-- Tech chips -->
  <g transform="translate(96 624)" font-family="JetBrains Mono, monospace" font-size="13" fill="#8a8aa0">
    <text x="0" y="0">Python · FastAPI · LangGraph · Google Gemini · pgvector · MCP · Next.js</text>
  </g>
</svg>
