<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="M. Sharjeel Saleem - AI Product Engineer building production-ready AI products with applied LLM systems, agentic workflows, and full-stack delivery." />
    <meta name="theme-color" content="#0f172a" />
    <meta name="author" content="M. Sharjeel Saleem" />
    <link rel="canonical" href="https://muhammad-sharjeel-portfolio.netlify.app/" />

    <!-- Open Graph (LinkedIn, WhatsApp, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://muhammad-sharjeel-portfolio.netlify.app/" />
    <meta property="og:title" content="M. Sharjeel Saleem — AI Product Engineer" />
    <meta property="og:description" content="Production-ready AI products: RAG, agentic workflows, applied LLM systems, and full-stack delivery." />
    <meta property="og:image" content="https://muhammad-sharjeel-portfolio.netlify.app/profile_image.png" />
    <meta property="og:image:alt" content="M. Sharjeel Saleem" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="M. Sharjeel Saleem — AI Product Engineer" />
    <meta name="twitter:description" content="Production-ready AI products: RAG, agentic workflows, applied LLM systems, and full-stack delivery." />
    <meta name="twitter:image" content="https://muhammad-sharjeel-portfolio.netlify.app/profile_image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/profile_image.png" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/profile_image.png" as="image" />
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    
    <!-- Optimize font loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
    
    <title>M. Sharjeel Saleem - Portfolio</title>
    
    <!-- Critical CSS for initial render -->
    <style>
      /* Prevent FOUC */
      html { visibility: visible; opacity: 1; }
      
      /* Initial loading state */
      #root {
        min-height: 100vh;
        background: #0f172a;
      }
      
      /* Smooth scrolling */
      html { scroll-behavior: smooth; }
      
      /* Optimize animations */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
